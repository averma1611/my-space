<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }
  </style>
</head>
<body>
  <canvas id="space"></canvas>

  <script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      generateStars();
    });

    // --- Stars ---
    let stars = [];

    function generateStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 3000);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.2,
          alpha: Math.random() * 0.6 + 0.4,
          twinkleSpeed: Math.random() * 0.02 + 0.005,
          twinkleDir: Math.random() > 0.5 ? 1 : -1,
        });
      }
    }

    generateStars();

    // --- Nebula blobs (static, drawn once offscreen) ---
    const nebulaCanvas = document.createElement('canvas');
    nebulaCanvas.width = canvas.width;
    nebulaCanvas.height = canvas.height;
    const nctx = nebulaCanvas.getContext('2d');

    function drawNebula() {
      const blobs = [
        { x: canvas.width * 0.2,  y: canvas.height * 0.3,  r: 280, color: '60,0,120' },
        { x: canvas.width * 0.75, y: canvas.height * 0.6,  r: 220, color: '0,40,100' },
        { x: canvas.width * 0.5,  y: canvas.height * 0.15, r: 180, color: '80,0,60'  },
        { x: canvas.width * 0.85, y: canvas.height * 0.2,  r: 150, color: '0,60,80'  },
      ];
      blobs.forEach(b => {
        const g = nctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        g.addColorStop(0,   `rgba(${b.color},0.18)`);
        g.addColorStop(0.5, `rgba(${b.color},0.07)`);
        g.addColorStop(1,   `rgba(${b.color},0)`);
        nctx.fillStyle = g;
        nctx.beginPath();
        nctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        nctx.fill();
      });
    }

    drawNebula();

    // --- Comet trail ---
    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let trail = [];
    const TRAIL_LEN = 28;

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // --- Animation ---
    let tick = 0;

    function drawStars() {
      stars.forEach(s => {
        s.alpha += s.twinkleSpeed * s.twinkleDir;
        if (s.alpha >= 1)   { s.alpha = 1;   s.twinkleDir = -1; }
        if (s.alpha <= 0.2) { s.alpha = 0.2; s.twinkleDir =  1; }

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
      });
    }

    function drawComet() {
      // Push current mouse pos into trail
      trail.push({ x: mouse.x, y: mouse.y });
      if (trail.length > TRAIL_LEN) trail.shift();

      if (trail.length < 2) return;

      // Draw tail
      for (let i = 1; i < trail.length; i++) {
        const t = i / trail.length;           // 0 → tail tip, 1 → head
        const width = t * 4;
        const alpha = t * 0.7;

        // Color shifts from cyan-white at head to deep blue at tail
        const r = Math.round(180 + t * 75);
        const g = Math.round(220 + t * 35);
        const b = 255;

        ctx.beginPath();
        ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      }

      // Glow halo at head
      const hx = trail[trail.length - 1].x;
      const hy = trail[trail.length - 1].y;

      const glow = ctx.createRadialGradient(hx, hy, 0, hx, hy, 18);
      glow.addColorStop(0,   'rgba(200,240,255,0.9)');
      glow.addColorStop(0.3, 'rgba(100,200,255,0.4)');
      glow.addColorStop(1,   'rgba(50,100,255,0)');
      ctx.beginPath();
      ctx.arc(hx, hy, 18, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Bright core
      ctx.beginPath();
      ctx.arc(hx, hy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,1)';
      ctx.fill();

      // Particle sparkles near head
      for (let i = 0; i < 3; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = Math.random() * 12 + 4;
        const px = hx + Math.cos(angle) * dist;
        const py = hy + Math.sin(angle) * dist;
        ctx.beginPath();
        ctx.arc(px, py, Math.random() * 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,230,255,${Math.random() * 0.6})`;
        ctx.fill();
      }
    }

    function loop() {
      tick++;

      // Space background
      ctx.fillStyle = '#020008';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Nebula
      ctx.drawImage(nebulaCanvas, 0, 0);

      drawStars();
      drawComet();

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
