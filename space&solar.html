<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space &amp; Solar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; height: 100vh; width: 100vw; cursor: none; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
<canvas id="space"></canvas>
<script>
const canvas = document.getElementById('space');
const ctx    = canvas.getContext('2d');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  generateStars();
  buildNebula();
});

// ── Stars ─────────────────────────────────────────────────────────────────────
let stars = [];
function generateStars() {
  stars = [];
  const n = Math.floor((canvas.width * canvas.height) / 3000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.2,
      a: Math.random() * 0.6 + 0.4,
      spd: Math.random() * 0.015 + 0.003,
      dir: Math.random() > 0.5 ? 1 : -1,
    });
  }
}
generateStars();

// ── Nebula (offscreen, rebuilt on resize) ─────────────────────────────────────
const nebulaCanvas = document.createElement('canvas');
function buildNebula() {
  nebulaCanvas.width  = canvas.width;
  nebulaCanvas.height = canvas.height;
  const nc = nebulaCanvas.getContext('2d');
  // Push nebula to the right side, away from the solar system
  const blobs = [
    { x: canvas.width * 0.72, y: canvas.height * 0.28, r: 300, c: '60,0,120'  },
    { x: canvas.width * 0.88, y: canvas.height * 0.65, r: 230, c: '0,40,100'  },
    { x: canvas.width * 0.55, y: canvas.height * 0.80, r: 180, c: '80,0,60'   },
    { x: canvas.width * 0.60, y: canvas.height * 0.12, r: 160, c: '0,60,80'   },
  ];
  blobs.forEach(b => {
    const g = nc.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0,   `rgba(${b.c},0.18)`);
    g.addColorStop(0.5, `rgba(${b.c},0.07)`);
    g.addColorStop(1,   `rgba(${b.c},0)`);
    nc.fillStyle = g;
    nc.beginPath();
    nc.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    nc.fill();
  });
}
buildNebula();

// ── Comet / cursor ────────────────────────────────────────────────────────────
let mouse = { x: canvas.width * 0.7, y: canvas.height / 2 };
let trail = [];
const TRAIL_LEN = 28;

// ── Solar system ──────────────────────────────────────────────────────────────
const SUN_X = 310;   // fixed left-side anchor

const planets = [
  { name: 'Home',     desc: 'Back to start',    color: '#b8b8b8', glow: '#e0e0ff', size: 5,  orbitR: 62,  speed: 0.90, angle: 0.0,  rings: false },
  { name: 'About',    desc: 'Who I am',          color: '#e8d5a0', glow: '#ffe8a0', size: 7,  orbitR: 100, speed: 0.55, angle: 1.0,  rings: false },
  { name: 'Projects', desc: 'What I\'ve built',  color: '#4a8fd4', glow: '#80c0ff', size: 8,  orbitR: 144, speed: 0.38, angle: 2.1,  rings: false },
  { name: 'Skills',   desc: 'What I know',       color: '#c05050', glow: '#ff9090', size: 6,  orbitR: 188, speed: 0.28, angle: 3.5,  rings: false },
  { name: 'Contact',  desc: 'Get in touch',      color: '#d4703a', glow: '#ffaa60', size: 13, orbitR: 238, speed: 0.18, angle: 4.2,  rings: false },
  { name: 'Blog',     desc: 'My thoughts',       color: '#c89248', glow: '#ffd080', size: 10, orbitR: 285, speed: 0.12, angle: 5.0,  rings: true  },
];

// Asteroid belt lives between Skills (188) and Contact (238)
const asteroids = Array.from({ length: 90 }, () => ({
  orbitR: 212 + (Math.random() - 0.5) * 22,
  angle:  Math.random() * Math.PI * 2,
  speed:  (Math.random() * 0.06 + 0.10) * (Math.random() > 0.5 ? 1 : -1) * 0.2,
  r:      Math.random() * 1.2 + 0.3,
  a:      Math.random() * 0.45 + 0.25,
}));

// Click ripples
let ripples = [];

let hoveredPlanet = null;
let tick = 0;

// ── Input ─────────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  const sy = canvas.height / 2;
  hoveredPlanet = null;
  for (const p of planets) {
    const px = SUN_X + Math.cos(p.angle) * p.orbitR;
    const py = sy    + Math.sin(p.angle) * p.orbitR;
    if (Math.hypot(e.clientX - px, e.clientY - py) < p.size + 12) {
      hoveredPlanet = p;
      break;
    }
  }
});

canvas.addEventListener('click', e => {
  const sy = canvas.height / 2;
  for (const p of planets) {
    const px = SUN_X + Math.cos(p.angle) * p.orbitR;
    const py = sy    + Math.sin(p.angle) * p.orbitR;
    if (Math.hypot(e.clientX - px, e.clientY - py) < p.size + 12) {
      ripples.push({ x: px, y: py, r: p.size * 1.2, maxR: 70, a: 0.9, color: p.glow });
    }
  }
});

// ── Draw helpers ──────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const v = parseInt(hex.slice(1), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}

function lighten(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y,         x + r, y);
  ctx.closePath();
}

// ── Solar system drawing ───────────────────────────────────────────────────────
function drawSun(sy) {
  const x = SUN_X, y = sy;
  const pulse = 1 + Math.sin(tick * 0.035) * 0.1;

  // Outer corona
  const corona = ctx.createRadialGradient(x, y, 14, x, y, 58 * pulse);
  corona.addColorStop(0,   'rgba(255,200,50,0.22)');
  corona.addColorStop(0.5, 'rgba(255,100,0,0.08)');
  corona.addColorStop(1,   'rgba(255,50,0,0)');
  ctx.beginPath();
  ctx.arc(x, y, 58 * pulse, 0, Math.PI * 2);
  ctx.fillStyle = corona;
  ctx.fill();

  // Body
  const body = ctx.createRadialGradient(x - 7, y - 7, 2, x, y, 20);
  body.addColorStop(0,   '#fff8c0');
  body.addColorStop(0.3, '#ffcc00');
  body.addColorStop(0.7, '#ff8800');
  body.addColorStop(1,   '#ff4400');
  ctx.beginPath();
  ctx.arc(x, y, 20, 0, Math.PI * 2);
  ctx.fillStyle = body;
  ctx.fill();
}

function drawOrbitRing(sy, r, hovered) {
  ctx.beginPath();
  ctx.arc(SUN_X, sy, r, 0, Math.PI * 2);
  ctx.strokeStyle = hovered ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.06)';
  ctx.lineWidth   = hovered ? 1.2 : 0.7;
  ctx.setLineDash(hovered ? [4, 6] : [2, 12]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlanet(p, sy) {
  const cx = SUN_X + Math.cos(p.angle) * p.orbitR;
  const cy = sy    + Math.sin(p.angle) * p.orbitR;
  const hov = hoveredPlanet === p;

  // Saturn rings — back half
  if (p.rings) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, 0.32);
    ctx.beginPath();
    ctx.arc(0, 0, p.size + 10, 0, Math.PI, true);
    ctx.strokeStyle = `rgba(200,160,80,0.5)`;
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.restore();
  }

  // Hover halo
  if (hov) {
    const [gr, gg, gb] = hexToRgb(p.glow);
    const halo = ctx.createRadialGradient(cx, cy, p.size * 0.6, cx, cy, p.size * 4);
    halo.addColorStop(0,   `rgba(${gr},${gg},${gb},0.5)`);
    halo.addColorStop(1,   `rgba(${gr},${gg},${gb},0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, p.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();
  }

  // Planet body
  const grad = ctx.createRadialGradient(cx - p.size * 0.3, cy - p.size * 0.35, p.size * 0.1, cx, cy, p.size);
  grad.addColorStop(0, lighten(p.color, 65));
  grad.addColorStop(1, p.color);
  ctx.beginPath();
  ctx.arc(cx, cy, p.size, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Saturn rings — front half
  if (p.rings) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, 0.32);
    ctx.beginPath();
    ctx.arc(0, 0, p.size + 10, 0, Math.PI, false);
    ctx.strokeStyle = `rgba(200,160,80,0.5)`;
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.restore();
  }

  // Label on hover
  if (hov) drawLabel(p, cx, cy);

  return { cx, cy };
}

function drawLabel(p, px, py) {
  // Measure text first so box can size itself
  ctx.font = 'bold 14px "Courier New", monospace';
  const nw = ctx.measureText(p.name).width;
  ctx.font = '11px "Courier New", monospace';
  const dw = ctx.measureText(p.desc).width;
  const boxW = Math.max(nw, dw) + 28;
  const boxH = 44;

  // Place label to the right of the orbit, avoiding the sun area
  const lx = SUN_X + p.orbitR + 28;
  const ly = py - boxH / 2;

  // Dashed connector line from planet edge to box
  ctx.beginPath();
  ctx.moveTo(px + p.size + 2, py);
  ctx.lineTo(lx - 4, py);
  const [gr, gg, gb] = hexToRgb(p.glow);
  ctx.strokeStyle = `rgba(${gr},${gg},${gb},0.6)`;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Box background
  roundRect(lx, ly, boxW, boxH, 6);
  ctx.fillStyle = 'rgba(2,4,20,0.82)';
  ctx.fill();
  ctx.strokeStyle = `rgba(${gr},${gg},${gb},0.5)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Planet name
  ctx.font = 'bold 14px "Courier New", monospace';
  ctx.fillStyle = p.glow;
  ctx.fillText(p.name, lx + 14, ly + 17);

  // Description
  ctx.font = '11px "Courier New", monospace';
  ctx.fillStyle = 'rgba(190,215,255,0.75)';
  ctx.fillText(p.desc, lx + 14, ly + 33);
}

function drawAsteroids(sy) {
  for (const a of asteroids) {
    a.angle += a.speed * 0.016;
    const ax = SUN_X + Math.cos(a.angle) * a.orbitR;
    const ay = sy    + Math.sin(a.angle) * a.orbitR;
    ctx.beginPath();
    ctx.arc(ax, ay, a.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(175,165,155,${a.a})`;
    ctx.fill();
  }
}

function drawRipples() {
  ripples = ripples.filter(rp => rp.a > 0.02);
  for (const rp of ripples) {
    const [r, g, b] = hexToRgb(rp.color);
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${rp.a})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    rp.r += 2;
    rp.a *= 0.92;
  }
}

// ── Space background drawing ──────────────────────────────────────────────────
function drawStars() {
  for (const s of stars) {
    s.a += s.spd * s.dir;
    if (s.a >= 1)   { s.a = 1;   s.dir = -1; }
    if (s.a <= 0.2) { s.a = 0.2; s.dir =  1; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  }
}

function drawComet() {
  trail.push({ x: mouse.x, y: mouse.y });
  if (trail.length > TRAIL_LEN) trail.shift();
  if (trail.length < 2) return;

  for (let i = 1; i < trail.length; i++) {
    const t = i / trail.length;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x,   trail[i].y);
    ctx.strokeStyle = `rgba(${Math.round(180+t*75)},${Math.round(220+t*35)},255,${t*0.7})`;
    ctx.lineWidth   = t * 4;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();
  }

  const hx = trail[trail.length-1].x;
  const hy = trail[trail.length-1].y;

  const glow = ctx.createRadialGradient(hx, hy, 0, hx, hy, 18);
  glow.addColorStop(0,   'rgba(200,240,255,0.9)');
  glow.addColorStop(0.3, 'rgba(100,200,255,0.4)');
  glow.addColorStop(1,   'rgba(50,100,255,0)');
  ctx.beginPath();
  ctx.arc(hx, hy, 18, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(hx, hy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  for (let i = 0; i < 3; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = Math.random() * 12 + 4;
    ctx.beginPath();
    ctx.arc(hx + Math.cos(a)*d, hy + Math.sin(a)*d, Math.random()*1.2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,230,255,${Math.random()*0.6})`;
    ctx.fill();
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
  tick++;
  const sy = canvas.height / 2;

  ctx.fillStyle = '#020008';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(nebulaCanvas, 0, 0);

  drawStars();

  // Orbit rings (back layer)
  for (const p of planets) {
    drawOrbitRing(sy, p.orbitR, hoveredPlanet === p);
  }

  drawAsteroids(sy);
  drawSun(sy);

  // Advance & draw planets
  for (const p of planets) {
    const speedFactor = hoveredPlanet === p ? 0.08 : 1;
    p.angle += p.speed * 0.008 * speedFactor;
    drawPlanet(p, sy);
  }

  drawRipples();
  drawComet();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
